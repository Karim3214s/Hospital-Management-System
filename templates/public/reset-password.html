{% extends "common/base.html" %}

{% block title %}Reset Password - HMS{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-lock fa-3x text-success mb-3"></i>
                        <h3>Reset Password</h3>
                        <p class="text-muted">Enter your new password below</p>
                    </div>
                    
                    {% if error %}
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="fas fa-exclamation-circle"></i> {{ error }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    {% endif %}
                    
                    <form method="POST" id="resetPasswordForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                <i class="fas fa-key"></i> New Password
                            </label>
                            <input type="password" 
                                   class="form-control form-control-lg" 
                                   name="password" 
                                   id="password"
                                   required 
                                   minlength="8" 
                                   placeholder="At least 8 characters">
                            <small class="text-muted">
                                <i class="fas fa-info-circle"></i> 
                                Must be at least 8 characters long
                            </small>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                <i class="fas fa-check-circle"></i> Confirm Password
                            </label>
                            <input type="password" 
                                   class="form-control form-control-lg" 
                                   name="confirm_password" 
                                   id="confirm_password"
                                   required 
                                   minlength="8"
                                   placeholder="Re-type password">
                        </div>
                        
                        <!-- Password strength indicator -->
                        <div class="mb-3">
                            <div class="progress" style="height: 5px;">
                                <div class="progress-bar" id="strengthBar" role="progressbar"></div>
                            </div>
                            <small id="strengthText" class="text-muted"></small>
                        </div>
                        
                        <button type="submit" class="btn btn-success btn-lg w-100 mb-3" id="submitBtn">
                            <i class="fas fa-check"></i> Reset Password
                        </button>
                        
                        <div class="text-center">
                            <a href="/login" class="text-decoration-none">
                                <i class="fas fa-arrow-left"></i> Back to Login
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const passwordInput = document.getElementById('password');
const confirmInput = document.getElementById('confirm_password');
const strengthBar = document.getElementById('strengthBar');
const strengthText = document.getElementById('strengthText');
const form = document.getElementById('resetPasswordForm');

// Password strength checker
passwordInput.addEventListener('input', function() {
    const password = this.value;
    let strength = 0;
    
    if (password.length >= 8) strength += 25;
    if (password.length >= 12) strength += 25;
    if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength += 25;
    if (/\d/.test(password)) strength += 15;
    if (/[^a-zA-Z0-9]/.test(password)) strength += 10;
    
    strengthBar.style.width = strength + '%';
    
    if (strength < 30) {
        strengthBar.className = 'progress-bar bg-danger';
        strengthText.textContent = 'Weak password';
    } else if (strength < 60) {
        strengthBar.className = 'progress-bar bg-warning';
        strengthText.textContent = 'Fair password';
    } else if (strength < 80) {
        strengthBar.className = 'progress-bar bg-info';
        strengthText.textContent = 'Good password';
    } else {
        strengthBar.className = 'progress-bar bg-success';
        strengthText.textContent = 'Strong password';
    }
});

// Form validation
form.addEventListener('submit', function(e) {
    const password = passwordInput.value;
    const confirm = confirmInput.value;
    
    if (password !== confirm) {
        e.preventDefault();
        confirmInput.classList.add('is-invalid');
        alert('Passwords do not match!');
        return false;
    }
    
    if (password.length < 8) {
        e.preventDefault();
        passwordInput.classList.add('is-invalid');
        alert('Password must be at least 8 characters long!');
        return false;
    }
    
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resetting...';
});

// Remove invalid class on input
confirmInput.addEventListener('input', function() {
    this.classList.remove('is-invalid');
});
passwordInput.addEventListener('input', function() {
    this.classList.remove('is-invalid');
});
</script>

<style>
.card {
    border: none;
    border-radius: 15px;
}

.form-control:focus {
    border-color: #1cc88a;
    box-shadow: 0 0 0 0.2rem rgba(28, 200, 138, 0.25);
}

.btn-success {
    background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
    border: none;
}

.btn-success:hover {
    background: linear-gradient(135deg, #0f8677 0%, #2dd36a 100%);
    transform: translateY(-2px);
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}

.progress {
    background-color: #e9ecef;
}
</style>
{% endblock %}
